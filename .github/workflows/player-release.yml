name: Build Player Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.19.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build player and icon generator
        run: |
          cargo build --release --features player --target x86_64-pc-windows-msvc
          cargo build --release --bin generate-icons --target x86_64-pc-windows-msvc
      - name: Generate textures and icons
        run: target\x86_64-pc-windows-msvc\release\generate-icons.exe
        shell: cmd
      - name: Package
        run: |
          mkdir bundle
          copy target\x86_64-pc-windows-msvc\release\protocol-play.exe bundle\protocol-play-player.exe
          for %%f in (campaign_levels\*.json) do copy "%%f" "bundle\"
          xcopy /E /I assets\icons bundle\assets\icons
          xcopy /E /I assets\textures bundle\assets\textures
          cd bundle && 7z a ../protocol-play-player-windows.zip *
        shell: cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-play-player-windows.zip
          path: protocol-play-player-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build player and icon generator
        run: |
          cargo build --release --features player --target aarch64-apple-darwin
          cargo build --release --bin generate-icons --target aarch64-apple-darwin
      - name: Generate textures and icons
        run: ./target/aarch64-apple-darwin/release/generate-icons
      - name: Package
        run: |
          mkdir -p bundle/assets
          cp target/aarch64-apple-darwin/release/protocol-play bundle/protocol-play-player
          chmod +x bundle/protocol-play-player
          cp campaign_levels/*.json bundle/
          cp -r assets/icons assets/textures bundle/assets/
          cd bundle && tar czf ../protocol-play-player-macos.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-play-player-macos.tar.gz
          path: protocol-play-player-macos.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Build player and icon generator
        run: |
          cargo build --release --features player
          cargo build --release --bin generate-icons
      - name: Generate textures and icons
        run: ./target/release/generate-icons
      - name: Package
        run: |
          mkdir -p bundle/assets
          cp target/release/protocol-play bundle/protocol-play-player
          chmod +x bundle/protocol-play-player
          cp campaign_levels/*.json bundle/
          cp -r assets/icons assets/textures bundle/assets/
          cd bundle && tar czf ../protocol-play-player-linux.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-play-player-linux.tar.gz
          path: protocol-play-player-linux.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cp artifacts/protocol-play-player-windows.zip/protocol-play-player-windows.zip .
          cp artifacts/protocol-play-player-macos.tar.gz/protocol-play-player-macos.tar.gz .
          cp artifacts/protocol-play-player-linux.tar.gz/protocol-play-player-linux.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "protocol: play ${{ inputs.tag }}"
          body: |
            Player build with 149 campaign levels across 13 chapters.

            **Windows**: Extract the zip, open the folder, run `protocol-play-player.exe`.
            **macOS**: Extract, open the folder, then: `chmod +x protocol-play-player && ./protocol-play-player`
            **Linux**: Extract, open the folder, then: `chmod +x protocol-play-player && ./protocol-play-player`

            Use `--reset-stats` to clear all progress and start fresh.
          files: |
            protocol-play-player-windows.zip
            protocol-play-player-macos.tar.gz
            protocol-play-player-linux.tar.gz
