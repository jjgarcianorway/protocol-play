name: Build Player Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.18.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build player
        run: cargo build --release --features player --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          mkdir bundle
          copy target\x86_64-pc-windows-msvc\release\protocol-play.exe bundle\protocol-player-windows.exe
          for %%f in (levels\*.json) do copy "%%f" "bundle\"
          cd bundle && 7z a ../protocol-player-windows.zip *
        shell: cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-player-windows.zip
          path: protocol-player-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build player
        run: cargo build --release --features player --target aarch64-apple-darwin
      - name: Package
        run: |
          mkdir bundle
          cp target/aarch64-apple-darwin/release/protocol-play bundle/protocol-player-macos
          chmod +x bundle/protocol-player-macos
          cp levels/*.json bundle/
          tar czf protocol-player-macos.tar.gz -C bundle .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-player-macos.tar.gz
          path: protocol-player-macos.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Build player
        run: cargo build --release --features player
      - name: Package
        run: |
          mkdir bundle
          cp target/release/protocol-play bundle/protocol-player-linux
          chmod +x bundle/protocol-player-linux
          cp levels/*.json bundle/
          tar czf protocol-player-linux.tar.gz -C bundle .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-player-linux.tar.gz
          path: protocol-player-linux.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cp artifacts/protocol-player-windows.zip/protocol-player-windows.zip .
          cp artifacts/protocol-player-macos.tar.gz/protocol-player-macos.tar.gz .
          cp artifacts/protocol-player-linux.tar.gz/protocol-player-linux.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "protocol: play ${{ inputs.tag }}"
          body: |
            Player build with 149 campaign levels across 13 chapters.

            **Windows**: Extract the zip and run `protocol-player-windows.exe`.
            **macOS**: Extract, then `chmod +x protocol-player-macos && ./protocol-player-macos`
            **Linux**: Extract and run `chmod +x protocol-player-linux && ./protocol-player-linux`

            Use `--reset-stats` to clear all progress and start fresh.
            Stats are logged to `stats.jsonl` next to the executable.
          files: |
            protocol-player-windows.zip
            protocol-player-macos.tar.gz
            protocol-player-linux.tar.gz
