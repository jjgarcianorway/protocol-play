name: Build Player Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.12.0-player)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build player
        run: cargo build --release --features player --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          mkdir bundle
          copy target\x86_64-pc-windows-msvc\release\protocol-play.exe bundle\protocol-player-windows.exe
          copy levels\paula.json bundle\level.json
        shell: cmd
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: bundle/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build player
        run: cargo build --release --features player --target aarch64-apple-darwin
      - name: Package
        run: |
          mkdir bundle
          cp target/aarch64-apple-darwin/release/protocol-play bundle/protocol-player-macos
          chmod +x bundle/protocol-player-macos
          cp levels/paula.json bundle/level.json
          cp macos/Play.command bundle/Play.command
          chmod +x bundle/Play.command
          cd bundle && zip ../protocol-player-macos.zip protocol-player-macos level.json Play.command
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: protocol-player-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cp artifacts/macos-zip/protocol-player-macos.zip .
          cd artifacts/windows-bundle && zip ../../protocol-player-windows.zip protocol-player-windows.exe level.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Player ${{ inputs.tag }}"
          body: |
            Player build for testing levels.

            **Windows**: Extract the zip and run `protocol-player-windows.exe`. Level included.
            **macOS**: Extract the zip and double-click `Play.command`. It handles permissions automatically. Level included.
          files: |
            protocol-player-windows.zip
            protocol-player-macos.zip
